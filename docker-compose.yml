version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16   # pg16 with pgvector extension pre-installed
    restart: unless-stopped
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance_secret
      POSTGRES_DB: compliance_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init extensions on first DB creation (before Prisma migrations).
      # Contains only: CREATE EXTENSION vector, pg_trgm, uuid-ossp.
      # Full supplemental setup (FTS, SSO table, retention) is in setup.sql
      # and runs automatically at backend startup after prisma db push.
      - ./init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U compliance']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
      - '1234:1234'   # Hocuspocus collaboration server (P22)
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_URL: ${APP_URL:-http://localhost:3001}
      DATABASE_URL: postgresql://compliance:compliance_secret@postgres:5432/compliance_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_refresh}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      LLM_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      API_PREFIX: api/v1
      # Collaboration server (P22) — set to "true" to enable
      COLLABORATION_ENABLED: ${COLLABORATION_ENABLED:-false}
      COLLABORATION_PORT: ${COLLABORATION_PORT:-1234}
      # Storage (P19 E4)
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_DOMAIN: ${RESEND_FROM_DOMAIN}
      # Credential encryption
      LOCAL_SECRET_ENCRYPTION_KEY: ${LOCAL_SECRET_ENCRYPTION_KEY:-change_me_in_production}
    volumes:
      # Mount setup.sql so the startup CMD can apply supplemental SQL after prisma db push
      - ./setup.sql:/app/setup.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
        NEXT_PUBLIC_COLLABORATION_URL: ${NEXT_PUBLIC_COLLABORATION_URL:-ws://localhost:1234}
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
